<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="100%" stop-color="#150029"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#hexBg)"/>

  <!-- reusable hexagon path centered at 0,0 with radius 34 -->
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#ffffff" text-anchor="middle">

    <g transform="translate(90,100)">
      <polygon points="34,0 17,29.4 -17,29.4 -34,0 -17,-29.4 17,-29.4" fill="#0a0014" stroke="#A855F7" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      </polygon>
      <text y="5">Laravel</text>
    </g>

    <g transform="translate(230,100)">
      <polygon points="34,0 17,29.4 -17,29.4 -34,0 -17,-29.4 17,-29.4" fill="#0a0014" stroke="#A855F7" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="14s" repeatCount="indefinite"/>
      </polygon>
      <text y="5">React</text>
    </g>

    <g transform="translate(370,100)">
      <polygon points="34,0 17,29.4 -17,29.4 -34,0 -17,-29.4 17,-29.4" fill="#0a0014" stroke="#C084FC" stroke-width="2.5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
      </polygon>
      <text y="5">C++</text>
    </g>

    <g transform="translate(510,100)">
      <polygon points="34,0 17,29.4 -17,29.4 -34,0 -17,-29.4 17,-29.4" fill="#0a0014" stroke="#A855F7" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="13s" repeatCount="indefinite"/>
      </polygon>
      <text y="5">Linux</text>
    </g>

    <g transform="translate(650,100)">
      <polygon points="34,0 17,29.4 -17,29.4 -34,0 -17,-29.4 17,-29.4" fill="#0a0014" stroke="#A855F7" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="11s" repeatCount="indefinite"/>
      </polygon>
      <text y="5">Blender</text>
    </g>

  </g>

  <!-- connecting rail -->
  <line x1="60" y1="160" x2="740" y2="160" stroke="#3b0764" stroke-width="1" opacity="0.6"/>
  <circle r="3" fill="#C084FC">
    <animateMotion path="M60,160 L740,160 L60,160" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>

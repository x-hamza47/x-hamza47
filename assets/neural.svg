  <clipPath id="skFrame"><rect width="1000" height="960" rx="14"/></clipPath>
</defs>
<g clip-path="url(#skFrame)">
<rect width="1000" height="960" fill="url(#skBg)"/>
<g stroke="#7C3AED" stroke-opacity="0.07">
  <path d="M0,120 H1000 M0,280 H1000 M0,440 H1000 M0,600 H1000 M0,760 H1000 M0,920 H1000"/>
</g>

<!-- scanline -->
<rect x="0" y="0" width="1000" height="3" fill="#C084FC" opacity="0.06">

<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="nodeGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neuralBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="100%" stop-color="#150029"/>
    </linearGradient>
  </defs>

  <rect width="800" height="320" rx="10" fill="url(#neuralBg)"/>

  <!-- connecting lines, pulse -->
  <g stroke="#A855F7" stroke-width="1.5">
    <line x1="120" y1="70" x2="400" y2="160" opacity="0.5">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="120" y1="160" x2="400" y2="160" opacity="0.5">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="120" y1="250" x2="400" y2="160" opacity="0.5">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="160" x2="680" y2="70" opacity="0.5">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="160" x2="680" y2="160" opacity="0.5">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="160" x2="680" y2="250" opacity="0.5">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="1.9s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- traveling pulse dots along key lines -->
  <circle r="3" fill="#ffffff">
    <animateMotion path="M120,70 L400,160" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#ffffff">
    <animateMotion path="M400,160 L680,250" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- input nodes -->
  <g>
    <circle cx="120" cy="70" r="30" fill="url(#nodeGlow2)"/>
    <circle cx="120" cy="70" r="26" fill="#0a0014" stroke="#A855F7" stroke-width="2"/>
    <text x="120" y="75" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="11">Laravel</text>
  </g>
  <g>
    <circle cx="120" cy="160" r="30" fill="url(#nodeGlow2)"/>
    <circle cx="120" cy="160" r="26" fill="#0a0014" stroke="#A855F7" stroke-width="2"/>
    <text x="120" y="165" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="11">React</text>
  </g>
  <g>
    <circle cx="120" cy="250" r="30" fill="url(#nodeGlow2)"/>
    <circle cx="120" cy="250" r="26" fill="#0a0014" stroke="#A855F7" stroke-width="2"/>
    <text x="120" y="255" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="11">Three.js</text>
  </g>

  <!-- core node -->
  <g>
    <circle cx="400" cy="160" r="42" fill="url(#nodeGlow2)">
      <animate attributeName="r" values="38;46;38" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="160" r="38" fill="#0a0014" stroke="#C084FC" stroke-width="3"/>
    <text x="400" y="166" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">CORE</text>
  </g>

  <!-- output nodes -->
  <g>
    <circle cx="680" cy="70" r="30" fill="url(#nodeGlow2)"/>
    <circle cx="680" cy="70" r="26" fill="#0a0014" stroke="#A855F7" stroke-width="2"/>
    <text x="680" y="75" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="11">Security</text>
  </g>
  <g>
    <circle cx="680" cy="160" r="30" fill="url(#nodeGlow2)"/>
    <circle cx="680" cy="160" r="26" fill="#0a0014" stroke="#A855F7" stroke-width="2"/>
    <text x="680" y="165" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="11">Node.js</text>
  </g>
  <g>
    <circle cx="680" cy="250" r="30" fill="url(#nodeGlow2)"/>
    <circle cx="680" cy="250" r="26" fill="#0a0014" stroke="#A855F7" stroke-width="2"/>
    <text x="680" y="255" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="11">MySQL</text>
  </g>

  <text x="400" y="300" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#8b8b9e" letter-spacing="2">
    NEURAL SKILL PROCESSING — LIVE
  </text>
</svg>

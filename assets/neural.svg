<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="skBg" cx="50%" cy="50%" r="75%">
    <stop offset="0%" stop-color="#170430"/>
    <stop offset="100%" stop-color="#08000f"/>
  </radialGradient>
  <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f3e8ff"/>
    <stop offset="40%" stop-color="#A855F7"/>
    <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="skFrame"><rect width="900" height="420" rx="14"/></clipPath>
</defs>
<g clip-path="url(#skFrame)">
<rect width="900" height="420" fill="url(#skBg)"/>
<g stroke="#7C3AED" stroke-opacity="0.08">
  <path d="M0,70 H900 M0,140 H900 M0,210 H900 M0,280 H900 M0,350 H900"/>
</g>

<text x="30" y="38" font-family="JetBrains Mono, monospace" font-size="15" fill="#A855F7" letter-spacing="2">NEURAL SKILL MATRIX</text>
<text x="30" y="58" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#7c7c94">live capability graph &#8226; node size = proficiency</text>

<!-- central core node -->
<g transform="translate(450,225)">
  <circle r="46" fill="url(#nodeGlow)" opacity="0.6"/>
  <circle r="30" fill="none" stroke="#C084FC" stroke-width="1" opacity="0.6" stroke-dasharray="2 5">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle r="16" fill="#e9d5ff"/>
  <text y="4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#170430" font-weight="700">CORE</text>
</g>

<!-- skill nodes: id, x, y, label, level(radius), color -->
<g font-family="JetBrains Mono, monospace">
  <!-- connecting lines drawn first -->
  <g stroke="#A855F7" stroke-opacity="0.35" stroke-width="1.2">
    <line x1="450" y1="225" x2="180" y2="100"/>
    <line x1="450" y1="225" x2="150" y2="230"/>
    <line x1="450" y1="225" x2="200" y2="355"/>
    <line x1="450" y1="225" x2="720" y2="95"/>
    <line x1="450" y1="225" x2="760" y2="230"/>
    <line x1="450" y1="225" x2="700" y2="360"/>
    <line x1="450" y1="225" x2="450" y2="70"/>
    <line x1="450" y1="225" x2="450" y2="380"/>
  </g>

  <!-- pulses traveling along the connections -->
  <g fill="#e9d5ff">
    <circle r="2.4"><animateMotion dur="2.3s" repeatCount="indefinite" path="M450,225 L180,100"/></circle>
    <circle r="2.4"><animateMotion dur="2.7s" repeatCount="indefinite" path="M450,225 L760,230"/></circle>
    <circle r="2.4"><animateMotion dur="3.1s" repeatCount="indefinite" path="M450,225 L200,355"/></circle>
    <circle r="2.4"><animateMotion dur="2.5s" repeatCount="indefinite" path="M450,225 L720,95"/></circle>
    <circle r="2.4"><animateMotion dur="2.9s" repeatCount="indefinite" path="M450,225 L450,70"/></circle>
    <circle r="2.4"><animateMotion dur="2.2s" repeatCount="indefinite" path="M450,225 L700,360"/></circle>
  </g>

  <!-- node: React -->
  <g transform="translate(180,100)">
    <circle r="26" fill="url(#nodeGlow)" opacity="0.5"/>
    <circle r="15" fill="#1a0533" stroke="#A855F7" stroke-width="2"/>
    <text text-anchor="middle" y="5" font-size="11" fill="#e9d5ff" font-weight="700">92%</text>
    <text text-anchor="middle" y="34" font-size="12" fill="#c9d1d9">React / TS</text>
  </g>

  <!-- node: Laravel -->
  <g transform="translate(150,230)">
    <circle r="24" fill="url(#nodeGlow)" opacity="0.5"/>
    <circle r="14" fill="#1a0533" stroke="#A855F7" stroke-width="2"/>
    <text text-anchor="middle" y="5" font-size="11" fill="#e9d5ff" font-weight="700">88%</text>
    <text text-anchor="middle" y="33" font-size="12" fill="#c9d1d9">Laravel / PHP</text>
  </g>

  <!-- node: Security -->
  <g transform="translate(200,355)">
    <circle r="27" fill="url(#nodeGlow)" opacity="0.5"/>
    <circle r="16" fill="#1a0533" stroke="#A855F7" stroke-width="2"/>
    <text text-anchor="middle" y="5" font-size="11" fill="#e9d5ff" font-weight="700">80%</text>
    <text text-anchor="middle" y="35" font-size="12" fill="#c9d1d9">AppSec</text>
  </g>

  <!-- node: Three.js -->
  <g transform="translate(720,95)">
    <circle r="23" fill="url(#nodeGlow)" opacity="0.5"/>
    <circle r="13" fill="#1a0533" stroke="#A855F7" stroke-width="2"/>
    <text text-anchor="middle" y="5" font-size="11" fill="#e9d5ff" font-weight="700">75%</text>
    <text text-anchor="middle" y="33" font-size="12" fill="#c9d1d9">Three.js</text>
  </g>

  <!-- node: Databases -->
  <g transform="translate(760,230)">
    <circle r="24" fill="url(#nodeGlow)" opacity="0.5"/>
    <circle r="14" fill="#1a0533" stroke="#A855F7" stroke-width="2"/>
    <text text-anchor="middle" y="5" font-size="11" fill="#e9d5ff" font-weight="700">85%</text>
    <text text-anchor="middle" y="33" font-size="12" fill="#c9d1d9">MongoDB / SQL</text>
  </g>

  <!-- node: Design -->
  <g transform="translate(700,360)">
    <circle r="22" fill="url(#nodeGlow)" opacity="0.5"/>
    <circle r="12" fill="#1a0533" stroke="#A855F7" stroke-width="2"/>
    <text text-anchor="middle" y="5" font-size="10.5" fill="#e9d5ff" font-weight="700">70%</text>
    <text text-anchor="middle" y="32" font-size="12" fill="#c9d1d9">Figma / Blender</text>
  </g>

  <!-- node: Systems -->
  <g transform="translate(450,70)">
    <circle r="23" fill="url(#nodeGlow)" opacity="0.5"/>
    <circle r="13" fill="#1a0533" stroke="#A855F7" stroke-width="2"/>
    <text text-anchor="middle" y="5" font-size="11" fill="#e9d5ff" font-weight="700">78%</text>
    <text text-anchor="middle" y="-20" font-size="12" fill="#c9d1d9">Linux / Git</text>
  </g>

  <!-- node: Networking -->
  <g transform="translate(450,380)">
    <circle r="22" fill="url(#nodeGlow)" opacity="0.5"/>
    <circle r="12" fill="#1a0533" stroke="#A855F7" stroke-width="2"/>
    <text text-anchor="middle" y="5" font-size="10.5" fill="#e9d5ff" font-weight="700">72%</text>
    <text text-anchor="middle" y="30" font-size="12" fill="#c9d1d9">Wireshark</text>
  </g>
</g>
</g>
<rect x="0.5" y="0.5" width="899" height="419" rx="14" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.55"/>
</svg>

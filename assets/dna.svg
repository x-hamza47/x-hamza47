<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dnaBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="50%" stop-color="#150029"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
  </defs>

  <rect width="800" height="220" fill="url(#dnaBg)"/>

  <!-- helix strands: two sine waves + rungs, generated as static positions with vertical drift to fake rotation -->
  <g>
    <!-- rungs + nodes, 20 pairs across width -->
    <g id="strandGroup">
      <!-- node pair 1 -->
      <g>
        <line x1="40" y1="60" x2="40" y2="160" stroke="#4C1D95" stroke-width="1.5" opacity="0.5">
          <animate attributeName="x1" values="40;60;40;20;40" dur="6s" repeatCount="indefinite"/>
          <animate attributeName="x2" values="40;20;40;60;40" dur="6s" repeatCount="indefinite"/>
        </line>
        <circle cx="40" cy="60" r="5" fill="#A855F7">
          <animate attributeName="cx" values="40;60;40;20;40" dur="6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="160" r="5" fill="#C084FC">
          <animate attributeName="cx" values="40;20;40;60;40" dur="6s" repeatCount="indefinite"/>
        </circle>
      </g>
      <g transform="translate(60,0)">
        <line x1="40" y1="70" x2="40" y2="150" stroke="#4C1D95" stroke-width="1.5" opacity="0.5">
          <animate attributeName="x1" values="40;20;40;60;40" dur="6s" begin="0.3s" repeatCount="indefinite"/>
          <animate attributeName="x2" values="40;60;40;20;40" dur="6s" begin="0.3s" repeatCount="indefinite"/>
        </line>
        <circle cx="40" cy="70" r="5" fill="#A855F7">
          <animate attributeName="cx" values="40;20;40;60;40" dur="6s" begin="0.3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="150" r="5" fill="#C084FC">
          <animate attributeName="cx" values="40;60;40;20;40" dur="6s" begin="0.3s" repeatCount="indefinite"/>
        </circle>
      </g>
      <g transform="translate(120,0)">
        <line x1="40" y1="80" x2="40" y2="140" stroke="#4C1D95" stroke-width="1.5" opacity="0.5">
          <animate attributeName="x1" values="40;60;40;20;40" dur="6s" begin="0.6s" repeatCount="indefinite"/>
          <animate attributeName="x2" values="40;20;40;60;40" dur="6s" begin="0.6s" repeatCount="indefinite"/>
        </line>
        <circle cx="40" cy="80" r="5" fill="#A855F7">
          <animate attributeName="cx" values="40;60;40;20;40" dur="6s" begin="0.6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="140" r="5" fill="#C084FC">
          <animate attributeName="cx" values="40;20;40;60;40" dur="6s" begin="0.6s" repeatCount="indefinite"/>
        </circle>
      </g>
      <g transform="translate(180,0)">
        <line x1="40" y1="90" x2="40" y2="130" stroke="#4C1D95" stroke-width="1.5" opacity="0.5">
          <animate attributeName="x1" values="40;20;40;60;40" dur="6s" begin="0.9s" repeatCount="indefinite"/>
          <animate attributeName="x2" values="40;60;40;20;40" dur="6s" begin="0.9s" repeatCount="indefinite"/>
        </line>
        <circle cx="40" cy="90" r="5" fill="#A855F7">
          <animate attributeName="cx" values="40;20;40;60;40" dur="6s" begin="0.9s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="130" r="5" fill="#C084FC">
          <animate attributeName="cx" values="40;60;40;20;40" dur="6s" begin="0.9s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>

    <!-- repeat pattern across the width via reuse -->
    <use href="#strandGroup" x="240"/>
    <use href="#strandGroup" x="480"/>
    <use href="#strandGroup" x="720" transform="scale(0.5,1) translate(720,0)"/>
  </g>

  <!-- labels for what each node represents -->
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#c9d1d9" text-anchor="middle">
    <text x="400" y="25">CODE · SECURITY · CREATIVITY · 3D · AUTOMATION</text>
  </g>

  <!-- ambient glow center line -->
  <line x1="0" y1="110" x2="800" y2="110" stroke="#A855F7" stroke-width="0.5" opacity="0.15"/>
</svg>

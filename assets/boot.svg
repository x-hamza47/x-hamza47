<svg width="100%" viewBox="0 0 800 232" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Boot sequence animation</title>
<desc>Terminal-style boot animation: a progress bar fills while the system initializes, then each subsequent line appears with a spinning loader that stops and resolves into a checkmark before the next line begins, ending in an authentication success message, then looping.</desc>
<defs>
<linearGradient id="bootBg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0a0014"/>
<stop offset="100%" stop-color="#150029"/>
</linearGradient>
<linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#6D28D9"/>
<stop offset="100%" stop-color="#C084FC"/>
</linearGradient>
</defs>
<rect width="800" height="232" rx="10" fill="url(#bootBg)" stroke="#A855F7" stroke-width="1" opacity="0.9"/>
<rect width="800" height="4" fill="#A855F7" opacity="0.08">
<animate attributeName="y" values="0;232;0" dur="5.8000s" repeatCount="indefinite"/>
</rect>
<text x="50" y="40" font-family="JetBrains Mono, monospace" font-size="14" fill="#A855F7">Initializing HAMZA.OS...<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.0000;0.0010;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></text>
<rect x="50" y="52" width="700" height="14" rx="7" fill="#1a0533" stroke="#3b0764" stroke-width="1"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.0000;0.0010;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></rect>
<rect x="50" y="52" height="14" rx="7" fill="url(#barFill)"><animate attributeName="width" values="0;0;700;700;0" keyTimes="0;0.0000;0.1552;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></rect>
<text x="750" y="63" font-family="JetBrains Mono, monospace" font-size="11" fill="#c9d1d9" text-anchor="end">100%<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1400;0.1552;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></text>
<text x="50" y="96" font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9">Full Stack Engine<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1552;0.1562;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></text>
<g><circle cx="36" cy="91" r="6" fill="none" stroke="#3b0764" stroke-width="2"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1552;0.1562;0.2586;0.2596" dur="5.8000s" begin="0s" repeatCount="indefinite"/></circle><path d="M 36 85 A 6 6 0 0 1 42 91" fill="none" stroke="#C084FC" stroke-width="2" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" values="0 36 91;0 36 91;360 36 91;360 36 91" keyTimes="0;0.1552;0.2586;1" dur="5.8000s" begin="0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1552;0.1562;0.2586;0.2596" dur="5.8000s" begin="0s" repeatCount="indefinite"/></path></g>
<path d="M 32 91 L 35 94 L 40 87" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2586;0.2596;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></path>
<text x="50" y="128" font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9">Security Toolkit<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2586;0.2596;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></text>
<g><circle cx="36" cy="123" r="6" fill="none" stroke="#3b0764" stroke-width="2"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2586;0.2596;0.3621;0.3631" dur="5.8000s" begin="0s" repeatCount="indefinite"/></circle><path d="M 36 117 A 6 6 0 0 1 42 123" fill="none" stroke="#C084FC" stroke-width="2" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" values="0 36 123;0 36 123;360 36 123;360 36 123" keyTimes="0;0.2586;0.3621;1" dur="5.8000s" begin="0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2586;0.2596;0.3621;0.3631" dur="5.8000s" begin="0s" repeatCount="indefinite"/></path></g>
<path d="M 32 123 L 35 126 L 40 119" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3621;0.3631;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></path>
<text x="50" y="160" font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9">3D Render Module<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3621;0.3631;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></text>
<g><circle cx="36" cy="155" r="6" fill="none" stroke="#3b0764" stroke-width="2"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3621;0.3631;0.4655;0.4665" dur="5.8000s" begin="0s" repeatCount="indefinite"/></circle><path d="M 36 149 A 6 6 0 0 1 42 155" fill="none" stroke="#C084FC" stroke-width="2" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" values="0 36 155;0 36 155;360 36 155;360 36 155" keyTimes="0;0.3621;0.4655;1" dur="5.8000s" begin="0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3621;0.3631;0.4655;0.4665" dur="5.8000s" begin="0s" repeatCount="indefinite"/></path></g>
<path d="M 32 155 L 35 158 L 40 151" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4655;0.4665;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></path>
<text x="50" y="192" font-family="JetBrains Mono, monospace" font-size="15" fill="#4ade80">AUTHENTICATION SUCCESSFUL -- WELCOME, VISITOR<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4655;0.4665;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></text>
<g><circle cx="36" cy="187" r="6" fill="none" stroke="#3b0764" stroke-width="2"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4655;0.4665;0.5862;0.5872" dur="5.8000s" begin="0s" repeatCount="indefinite"/></circle><path d="M 36 181 A 6 6 0 0 1 42 187" fill="none" stroke="#C084FC" stroke-width="2" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" values="0 36 187;0 36 187;360 36 187;360 36 187" keyTimes="0;0.4655;0.5862;1" dur="5.8000s" begin="0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4655;0.4665;0.5862;0.5872" dur="5.8000s" begin="0s" repeatCount="indefinite"/></path></g>
<path d="M 32 187 L 35 190 L 40 183" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5862;0.5872;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></path>
<rect x="560" y="202" width="9" height="16" fill="#A855F7"><animate attributeName="opacity" values="0;0;1;0;1;0;1;0;1;0;0" keyTimes="0;0.4655;0.4779;0.4903;0.5027;0.5151;0.5275;0.5399;0.5523;0.9310;1.0000" dur="5.8000s" begin="0s" repeatCount="indefinite"/></rect>
</svg>

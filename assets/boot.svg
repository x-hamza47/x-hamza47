<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bootBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="100%" stop-color="#150029"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
  </defs>

  <rect width="800" height="220" rx="10" fill="url(#bootBg)" stroke="#A855F7" stroke-width="1" opacity="0.9"/>

  <!-- scanline overlay -->
  <rect width="800" height="4" fill="#A855F7" opacity="0.08">
    <animate attributeName="y" values="0;220;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="16" fill="#A855F7">
    Initializing HAMZA.OS...
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0s" fill="freeze"/>
  </text>

  <!-- progress bar track -->
  <rect x="30" y="60" width="740" height="14" rx="7" fill="#1a0533" stroke="#3b0764" stroke-width="1"/>
  <rect x="30" y="60" height="14" rx="7" fill="url(#barFill)">
    <animate attributeName="width" values="0;740;740" keyTimes="0;0.55;1" dur="4s" begin="0.4s" fill="freeze" repeatCount="indefinite"/>
  </rect>
  <text x="770" y="70" font-family="JetBrains Mono, monospace" font-size="11" fill="#c9d1d9" text-anchor="end">
    <animate attributeName="opacity" values="0;1" begin="4s" dur="0.3s" fill="freeze" repeatCount="indefinite"/>
    100%
  </text>

  <!-- module checklist -->
  <g font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9">
    <text x="30" y="105" opacity="0">
      ✓ Full Stack Engine
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.1;0.2" dur="4s" begin="0.6s" fill="freeze" repeatCount="indefinite"/>
    </text>
    <text x="30" y="130" opacity="0">
      ✓ Security Toolkit
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.3;0.4" dur="4s" begin="0.6s" fill="freeze" repeatCount="indefinite"/>
    </text>
    <text x="30" y="155" opacity="0">
      ✓ 3D Render Module
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.5;0.6" dur="4s" begin="0.6s" fill="freeze" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- auth success -->
  <text x="30" y="190" font-family="JetBrains Mono, monospace" font-size="15" fill="#4ade80" opacity="0">
    AUTHENTICATION SUCCESSFUL — WELCOME, COMMANDER
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.75;0.85" dur="4s" begin="0.6s" fill="freeze" repeatCount="indefinite"/>
  </text>

  <!-- blinking cursor -->
  <rect x="560" y="178" width="9" height="16" fill="#A855F7" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.8;0.82;0.9;0.92;1" dur="4s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
</svg>

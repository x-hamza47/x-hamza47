<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tlBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="100%" stop-color="#150029"/>
    </linearGradient>
    <linearGradient id="tlLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#tlBg)"/>

  <!-- main rail -->
  <line x1="60" y1="110" x2="740" y2="110" stroke="url(#tlLine)" stroke-width="2"/>

  <!-- traveling energy pulse -->
  <circle r="4" fill="#ffffff">
    <animateMotion path="M60,110 L740,110" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- milestone: 2023 -->
  <g>
    <circle cx="150" cy="110" r="8" fill="#0a0014" stroke="#A855F7" stroke-width="3"/>
    <circle cx="150" cy="110" r="14" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="10;20;10" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="150" y="90" text-anchor="middle" fill="#c9d1d9" font-family="JetBrains Mono, monospace" font-size="13">2023</text>
    <text x="150" y="140" text-anchor="middle" fill="#8b8b9e" font-family="JetBrains Mono, monospace" font-size="11">Started building</text>
  </g>

  <!-- milestone: 2024 -->
  <g>
    <circle cx="330" cy="110" r="8" fill="#0a0014" stroke="#A855F7" stroke-width="3"/>
    <circle cx="330" cy="110" r="14" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="10;20;10" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <text x="330" y="90" text-anchor="middle" fill="#c9d1d9" font-family="JetBrains Mono, monospace" font-size="13">2024</text>
    <text x="330" y="140" text-anchor="middle" fill="#8b8b9e" font-family="JetBrains Mono, monospace" font-size="11">[Milestone]</text>
  </g>

  <!-- milestone: 2025 -->
  <g>
    <circle cx="510" cy="110" r="8" fill="#0a0014" stroke="#A855F7" stroke-width="3"/>
    <circle cx="510" cy="110" r="14" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="10;20;10" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="510" y="90" text-anchor="middle" fill="#c9d1d9" font-family="JetBrains Mono, monospace" font-size="13">2025</text>
    <text x="510" y="140" text-anchor="middle" fill="#8b8b9e" font-family="JetBrains Mono, monospace" font-size="11">[Milestone]</text>
  </g>

  <!-- milestone: 2026 (current, larger + pulsing) -->
  <g>
    <circle cx="670" cy="110" r="10" fill="#0a0014" stroke="#C084FC" stroke-width="4"/>
    <circle cx="670" cy="110" r="18" fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="14;26;14" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="670" y="88" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">2026</text>
    <text x="670" y="142" text-anchor="middle" fill="#A855F7" font-family="JetBrains Mono, monospace" font-size="11">NOW</text>
  </g>
</svg>

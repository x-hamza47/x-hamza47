<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="hudBg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" fill="url(#hudBg)"/>

  <!-- corner brackets -->
  <g stroke="#A855F7" stroke-width="2" fill="none" opacity="0.8">
    <path d="M20,20 L60,20 M20,20 L20,60"/>
    <path d="M880,20 L840,20 M880,20 L880,60"/>
    <path d="M20,220 L60,220 M20,220 L20,180"/>
    <path d="M880,220 L840,220 M880,220 L880,180"/>
  </g>

  <!-- floating particles -->
  <g fill="#C084FC">
    <circle cx="80" cy="60" r="2" opacity="0.7">
      <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="180" r="2.5" opacity="0.6">
      <animate attributeName="cy" values="180;155;180" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="190" r="1.8" opacity="0.5">
      <animate attributeName="cy" values="190;170;190" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="55" r="2.2" opacity="0.6">
      <animate attributeName="cy" values="55;75;55" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="35" r="1.5" opacity="0.5">
      <animate attributeName="cy" values="35;20;35" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="200" r="2" opacity="0.4">
      <animate attributeName="cy" values="200;180;200" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="205" r="1.7" opacity="0.5">
      <animate attributeName="cy" values="205;188;205" dur="3.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- concentric HUD rings -->
  <g fill="none" stroke="#A855F7">
    <circle cx="450" cy="120" r="100" stroke-width="1" opacity="0.15"/>
    <circle cx="450" cy="120" r="130" stroke-width="1" opacity="0.1"/>
    <circle cx="450" cy="120" r="70" stroke-width="1" opacity="0.12">
      <animateTransform attributeName="transform" type="rotate" from="0 450 120" to="360 450 120" dur="20s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- title -->
  <text x="450" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="56" fill="url(#titleGrad)" filter="url(#glow)">
    HAMZA AMIR
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- subtitle line -->
  <text x="450" y="150" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9" letter-spacing="3">
    SYSTEM STATUS: ONLINE
  </text>

  <!-- animated underline -->
  <rect x="350" y="165" width="200" height="2" fill="#A855F7">
    <animate attributeName="width" values="0;200;200;0" keyTimes="0;0.3;0.7;1" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x" values="450;350;350;450" keyTimes="0;0.3;0.7;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- bottom scan sweep -->
  <rect x="0" y="0" width="900" height="3" fill="#C084FC" opacity="0.5">
    <animate attributeName="y" values="0;240;0" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>

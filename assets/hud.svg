<svg width="100%" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Boot sequence into HUD reveal</title>
<desc>Terminal boot sequence plays, then crossfades into the name/status HUD panel, holds, then fades back to loop.</desc>

<!-- ============================================================ -->
<!-- SHARED DEFS -->
<!-- ============================================================ -->
<defs>
<linearGradient id="bootBg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0a0014"/>
<stop offset="100%" stop-color="#150029"/>
</linearGradient>
<linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#6D28D9"/>
<stop offset="100%" stop-color="#C084FC"/>
</linearGradient>
<radialGradient id="hudBg" cx="50%" cy="45%" r="75%">
<stop offset="0%" stop-color="#1a0533"/>
<stop offset="100%" stop-color="#0a0014"/>
</radialGradient>
<linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#C084FC"/>
<stop offset="50%" stop-color="#A855F7"/>
<stop offset="100%" stop-color="#7C3AED"/>
</linearGradient>
<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="6" result="blur"/>
<feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<!-- base fill so there's never a blank frame during crossfade -->
<rect width="900" height="240" rx="10" fill="#0a0014"/>

<!-- ============================================================ -->
<!-- CYCLE TIMING (total 11s)                                     -->
<!-- 0s -> 5.8s   : boot sequence plays                            -->
<!-- 5.8s -> 6.3s : crossfade boot -> hud                          -->
<!-- 6.3s -> 10.3s: hud holds                                      -->
<!-- 10.3s -> 11s : crossfade hud -> boot (loop point)             -->
<!-- ============================================================ -->

<!-- ============================================================ -->
<!-- BOOT GROUP -->
<!-- ============================================================ -->
<g>
<animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.42;0.42;0.9533;1" dur="15s" begin="0s" repeatCount="indefinite"/>

<rect width="900" height="240" rx="10" fill="url(#bootBg)" stroke="#A855F7" stroke-width="1" opacity="0.9"/>
<rect width="900" height="4" fill="#A855F7" opacity="0.08">
<animate attributeName="y" values="0;240;0" dur="5.8s" begin="0s" repeatCount="indefinite"/>
</rect>

<text x="70" y="42" font-family="JetBrains Mono, monospace" font-size="14" fill="#A855F7">Initializing HAMZA.OS...
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.0000;0.0010;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></text>

<rect x="70" y="54" width="760" height="14" rx="7" fill="#1a0533" stroke="#3b0764" stroke-width="1">
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.0000;0.0010;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></rect>
<rect x="70" y="54" height="14" rx="7" fill="url(#barFill)">
<animate attributeName="width" values="0;0;300;450;540;650;760;760;0" keyTimes="0;0;0.1552;0.35;0.36;0.55;0.56;0.9310;1" dur="5.8s" begin="0s" repeatCount="indefinite"/></rect>
<text x="815" y="65" font-family="JetBrains Mono, monospace" font-size="11" fill="#c9d1d9" text-anchor="end">100%
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1400;0.1552;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></text>

<text x="70" y="98" font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9">Full Stack Engine
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1552;0.1562;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></text>
<g><circle cx="50" cy="93" r="6" fill="none" stroke="#3b0764" stroke-width="2"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1552;0.1562;0.2586;0.2596" dur="5.8s" begin="0s" repeatCount="indefinite"/></circle>
<path d="M 50 87 A 6 6 0 0 1 56 93" fill="none" stroke="#C084FC" stroke-width="2" stroke-linecap="round">
<animateTransform attributeName="transform" type="rotate" values="0 50 93;0 50 93;360 50 93;360 50 93" keyTimes="0;0.1552;0.2586;1" dur="5.8s" begin="0s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1552;0.1562;0.2586;0.2596" dur="5.8s" begin="0s" repeatCount="indefinite"/></path></g>
<path d="M 46 93 L 49 96 L 54 89" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2586;0.2596;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></path>

<text x="70" y="130" font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9">Security Toolkit
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2586;0.2596;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></text>
<g><circle cx="50" cy="125" r="6" fill="none" stroke="#3b0764" stroke-width="2"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2586;0.2596;0.3621;0.3631" dur="5.8s" begin="0s" repeatCount="indefinite"/></circle>
<path d="M 50 119 A 6 6 0 0 1 56 125" fill="none" stroke="#C084FC" stroke-width="2" stroke-linecap="round">
<animateTransform attributeName="transform" type="rotate" values="0 50 125;0 50 125;360 50 125;360 50 125" keyTimes="0;0.2586;0.3621;1" dur="5.8s" begin="0s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2586;0.2596;0.3621;0.3631" dur="5.8s" begin="0s" repeatCount="indefinite"/></path></g>
<path d="M 46 125 L 49 128 L 54 121" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3621;0.3631;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></path>

<text x="70" y="162" font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9">3D Render Module
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3621;0.3631;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></text>
<g><circle cx="50" cy="157" r="6" fill="none" stroke="#3b0764" stroke-width="2"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3621;0.3631;0.4655;0.4665" dur="5.8s" begin="0s" repeatCount="indefinite"/></circle>
<path d="M 50 151 A 6 6 0 0 1 56 157" fill="none" stroke="#C084FC" stroke-width="2" stroke-linecap="round">
<animateTransform attributeName="transform" type="rotate" values="0 50 157;0 50 157;360 50 157;360 50 157" keyTimes="0;0.3621;0.4655;1" dur="5.8s" begin="0s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3621;0.3631;0.4655;0.4665" dur="5.8s" begin="0s" repeatCount="indefinite"/></path></g>
<path d="M 46 157 L 49 160 L 54 153" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4655;0.4665;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></path>

<text x="70" y="194" font-family="JetBrains Mono, monospace" font-size="15" fill="#4ade80">AUTHENTICATION SUCCESSFUL -- WELCOME, VISITOR
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4655;0.4665;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></text>
<g><circle cx="50" cy="189" r="6" fill="none" stroke="#3b0764" stroke-width="2"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4655;0.4665;0.5862;0.5872" dur="5.8s" begin="0s" repeatCount="indefinite"/></circle>
<path d="M 50 183 A 6 6 0 0 1 56 189" fill="none" stroke="#C084FC" stroke-width="2" stroke-linecap="round">
<animateTransform attributeName="transform" type="rotate" values="0 50 189;0 50 189;360 50 189;360 50 189" keyTimes="0;0.4655;0.5862;1" dur="5.8s" begin="0s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4655;0.4665;0.5862;0.5872" dur="5.8s" begin="0s" repeatCount="indefinite"/></path></g>
<path d="M 46 189 L 49 192 L 54 185" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5862;0.5872;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></path>

<rect x="590" y="204" width="9" height="16" fill="#A855F7">
<animate attributeName="opacity" values="0;0;1;0;1;0;1;0;1;0;0" keyTimes="0;0.4655;0.4779;0.4903;0.5027;0.5151;0.5275;0.5399;0.5523;0.9310;1.0000" dur="5.8s" begin="0s" repeatCount="indefinite"/></rect>
</g>

<!-- ============================================================ -->
<!-- HUD GROUP -->
<!-- ============================================================ -->
<g>
<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.42;0.42;0.9533;1" dur="15s" begin="0s" repeatCount="indefinite"/>

<rect width="900" height="240" fill="url(#hudBg)"/>
<g stroke="#A855F7" stroke-width="2" fill="none" opacity="0.8">
<path d="M20,20 L60,20 M20,20 L20,60"/>
<path d="M880,20 L840,20 M880,20 L880,60"/>
<path d="M20,220 L60,220 M20,220 L20,180"/>
<path d="M880,220 L840,220 M880,220 L880,180"/>
</g>
<g fill="#C084FC">
<circle cx="80" cy="60" r="2" opacity="0.7"><animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/></circle>
<circle cx="760" cy="180" r="2.5" opacity="0.6"><animate attributeName="cy" values="180;155;180" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0.15;0.6" dur="5s" repeatCount="indefinite"/></circle>
<circle cx="150" cy="190" r="1.8" opacity="0.5"><animate attributeName="cy" values="190;170;190" dur="3.5s" repeatCount="indefinite"/></circle>
<circle cx="820" cy="55" r="2.2" opacity="0.6"><animate attributeName="cy" values="55;75;55" dur="4.5s" repeatCount="indefinite"/></circle>
<circle cx="450" cy="35" r="1.5" opacity="0.5"><animate attributeName="cy" values="35;20;35" dur="3s" repeatCount="indefinite"/></circle>
<circle cx="300" cy="200" r="2" opacity="0.4"><animate attributeName="cy" values="200;180;200" dur="4.2s" repeatCount="indefinite"/></circle>
<circle cx="620" cy="205" r="1.7" opacity="0.5"><animate attributeName="cy" values="205;188;205" dur="3.8s" repeatCount="indefinite"/></circle>
</g>
<g fill="none" stroke="#A855F7">
<circle cx="450" cy="120" r="100" stroke-width="1" opacity="0.15"/>
<circle cx="450" cy="120" r="130" stroke-width="1" opacity="0.1"/>
<circle cx="450" cy="120" r="70" stroke-width="1" opacity="0.12">
<animateTransform attributeName="transform" type="rotate" from="0 450 120" to="360 450 120" dur="20s" repeatCount="indefinite"/>
</circle>
</g>
<text x="450" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="56" fill="url(#titleGrad)" filter="url(#glow)">
HAMZA AMIR
<animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
</text>
<text x="450" y="150" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9" letter-spacing="3">
SYSTEM STATUS: ONLINE
</text>
<rect x="350" y="165" width="200" height="2" fill="#A855F7">
<animate attributeName="width" values="0;200;200;0" keyTimes="0;0.3;0.7;1" dur="6s" repeatCount="indefinite"/>
<animate attributeName="x" values="450;350;350;450" keyTimes="0;0.3;0.7;1" dur="6s" repeatCount="indefinite"/>
</rect>
<rect x="0" y="0" width="900" height="3" fill="#C084FC" opacity="0.5">
<animate attributeName="y" values="0;240;0" dur="6s" repeatCount="indefinite"/>
</rect>
</g>
</svg>

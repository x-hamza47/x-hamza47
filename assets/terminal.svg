<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#150029"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <clipPath id="termClip">
      <rect x="0" y="0" width="800" height="320" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#termClip)">
    <rect width="800" height="320" fill="url(#termBg)"/>

    <!-- title bar -->
    <rect x="0" y="0" width="800" height="34" fill="#1a0533"/>
    <circle cx="24" cy="17" r="6" fill="#ff5f57"/>
    <circle cx="46" cy="17" r="6" fill="#febc2e"/>
    <circle cx="68" cy="17" r="6" fill="#28c840"/>
    <text x="400" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#8b8b9e">hamza@terminal: ~</text>

    <!-- body -->
    <g font-family="JetBrains Mono, monospace" font-size="15" fill="#c9d1d9">

      <text x="24" y="66" fill="#4ade80" opacity="0">
        visitor@github:~$ <tspan fill="#c9d1d9">whoami</tspan>
        <animate attributeName="opacity" values="0;1" begin="0.3s" dur="0.3s" fill="freeze" repeatCount="indefinite" additive="sum" restart="always"/>
      </text>
      <text x="24" y="90" fill="#A855F7" opacity="0">
        Hamza Amir — Full Stack Engineer
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.08;0.12" dur="8s" begin="0s" fill="freeze" repeatCount="indefinite"/>
      </text>

      <text x="24" y="124" fill="#4ade80" opacity="0">
        visitor@github:~$ <tspan fill="#c9d1d9">cat skills.txt</tspan>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.14;0.18" dur="8s" begin="0s" fill="freeze" repeatCount="indefinite"/>
      </text>
      <text x="24" y="148" fill="#A855F7" opacity="0">
        Laravel · React · Three.js · Security · Automation
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.22;0.26" dur="8s" begin="0s" fill="freeze" repeatCount="indefinite"/>
      </text>

      <text x="24" y="182" fill="#4ade80" opacity="0">
        visitor@github:~$ <tspan fill="#c9d1d9">git status</tspan>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.3;0.34" dur="8s" begin="0s" fill="freeze" repeatCount="indefinite"/>
      </text>
      <text x="24" y="206" fill="#A855F7" opacity="0">
        On branch main — always shipping, never stalling
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.38;0.42" dur="8s" begin="0s" fill="freeze" repeatCount="indefinite"/>
      </text>

      <text x="24" y="240" fill="#4ade80" opacity="0">
        visitor@github:~$ <tspan fill="#c9d1d9">run portfolio</tspan>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.46;0.5" dur="8s" begin="0s" fill="freeze" repeatCount="indefinite"/>
      </text>
      <text x="24" y="264" fill="#A855F7" opacity="0">
        Launching... done ✓ 3 modules loaded
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.54;0.58" dur="8s" begin="0s" fill="freeze" repeatCount="indefinite"/>
      </text>

      <text x="24" y="298" fill="#4ade80" opacity="0">
        visitor@github:~$ <tspan fill="#c9d1d9">connect --hamza</tspan>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.62;0.66" dur="8s" begin="0s" fill="freeze" repeatCount="indefinite"/>
      </text>

      <!-- blinking cursor -->
      <rect x="220" y="286" width="9" height="16" fill="#A855F7" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" keyTimes="0;0.66;0.7;0.75;0.8;0.85;0.9;1" dur="8s" begin="0s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <rect x="0.5" y="0.5" width="799" height="319" rx="10" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.7"/>
</svg>

name: Sync Profile Status

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  sync:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update last-synced timestamp
        run: |
          TIMESTAMP=$(TZ="Asia/Karachi" date +"%Y-%m-%d %H:%M %Z")
          sed -i "s|<!-- LAST_SYNCED_START -->.*<!-- LAST_SYNCED_END -->|<!-- LAST_SYNCED_START -->\`SYSTEM LAST SYNCED: ${TIMESTAMP}\`<!-- LAST_SYNCED_END -->|" README.md

      - name: Commit and push if changed
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: sync profile status [skip ci]"
          git push
